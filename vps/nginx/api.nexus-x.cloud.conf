# Backend API (nexusx-api on PM2 :8080) — api.nexus-x.cloud
upstream nexusx_api_upstream {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.nexus-x.cloud;

    client_max_body_size 25m;

    # Basic CORS preflight (real CORS done in the API)
    location / {
        proxy_pass         http://nexusx_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Certbot will append SSL + redirect when ./02-nginx.sh runs.
}