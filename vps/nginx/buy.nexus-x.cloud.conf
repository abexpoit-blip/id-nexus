# Frontend (React SPA) — buy.nexus-x.cloud
server {
    listen 80;
    listen [::]:80;
    server_name buy.nexus-x.cloud www.buy.nexus-x.cloud;

    root /var/www/buy.nexus-x.cloud;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/wasm image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the entry HTML
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    client_max_body_size 5m;

    # Certbot will append the SSL block + redirect when ./02-nginx.sh runs.
}